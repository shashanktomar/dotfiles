layouts:
    - fullscreen
    - tall
    - tall-right
    - wide
    - two-pane
    - 3column-left
    - middle-wide
    - 3column-right
    - 4column-left
    - 4column-right
    - column
    - row
    - floating
    - widescreen-tall
    - widescreen-tall-right
    - bsp

# Add "command" to the default mods
mod1:
    - option 
    - shift
mod2:
    - option
    - control
    - shift

# Modify the amethyst relaunch to use x and not z
relaunch-amethyst:
    mod: mod2
    key: x

# Enable focus-follows-mouse
mouse-follows-focus: false
focus-follows-mouse: false
mouse-swaps-windows: true
mouse-resizes-windows: true

# Add 10px margin between windows
window-margins: true
window-margin-size: 8 
smart-window-margins: true

# General
ignore-menu-bar: true
new-windows-to-main: true
follow-space-thrown-windows: false
enables-layout-hud-on-space-change: false
